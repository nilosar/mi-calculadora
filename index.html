<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --md-blue: #1976D2;
            --md-orange: #FF9800;
            --md-bg: #F5F5F5;
            --md-card: #FFFFFF;
            --md-text: #212121;
            --md-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--md-bg);
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--md-card);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: var(--md-shadow);
        }

        h1 { color: var(--md-blue); text-align: center; font-size: 1.5rem; }
        h2 { color: var(--md-orange); font-size: 1rem; margin-top: 25px; border-bottom: 1px solid #ddd; padding-bottom: 5px; }

        .input-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
            align-items: end;
        }

        .unit-group {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
        }

        label { font-size: 0.85rem; color: #666; display: block; }
        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .progress-container {
            grid-column: span 3;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-top: 5px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: var(--md-blue);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .perc-label {
            grid-column: span 3;
            text-align: right;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--md-blue);
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--md-blue);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .result-panel {
            margin-top: 20px;
            padding: 20px;
            background: #E8F5E9;
            border-radius: 8px;
            text-align: center;
        }

        .total-amount {
            font-size: 2rem;
            color: #2E7D32;
            font-weight: bold;
            margin: 10px 0;
        }

        .tramo-badge {
            background: var(--md-orange);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>Calculadora de Comisiones</h1>

    <h2>Cumplimiento de Metas</h2>
    
    <div class="input-group">
        <div><label>Suscripción (50%)</label></div>
        <div><label>Meta</label><input type="number" id="m_susc" value="58" oninput="calcularTodo()"></div>
        <div><label>Venta</label><input type="number" id="v_susc" value="0" oninput="calcularTodo()"></div>
        <div class="perc-label" id="txt_p_susc">0%</div>
        <div class="progress-container"><div id="bar_susc" class="progress-bar"></div></div>
    </div>

    <div class="input-group">
        <div><label>Porta Post (30%)</label></div>
        <div><label>Meta</label><input type="number" id="m_porta" value="38" oninput="calcularTodo()"></div>
        <div><label>Venta</label><input type="number" id="v_porta" value="0" oninput="calcularTodo()"></div>
        <div class="perc-label" id="txt_p_porta">0%</div>
        <div class="progress-container"><div id="bar_porta" class="progress-bar"></div></div>
    </div>

    <div class="input-group">
        <div><label>Fibra (20%)</label></div>
        <div><label>Meta</label><input type="number" id="m_fibra" value="5" oninput="calcularTodo()"></div>
        <div><label>Venta</label><input type="number" id="v_fibra" value="0" oninput="calcularTodo()"></div>
        <div class="perc-label" id="txt_p_fibra">0%</div>
        <div class="progress-container"><div id="bar_fibra" class="progress-bar"></div></div>
    </div>

    <h2>Unidades a Liquidar</h2>
    <div class="unit-group">
        <label>Voz Captura / Porta Prepago / MIS</label>
        <input type="number" id="q_captura" value="0" oninput="calcularTodo()">
    </div>
    <div class="unit-group">
        <label>Voz Base</label>
        <input type="number" id="q_base" value="0" oninput="calcularTodo()">
    </div>
    <div class="unit-group">
        <label>Portabilidad SS a SS</label>
        <input type="number" id="q_ss" value="0" oninput="calcularTodo()">
    </div>
    <div class="unit-group">
